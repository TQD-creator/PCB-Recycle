services:
  redis:
    image: redis:7-alpine
    container_name: pcb-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcb-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      REDIS_URL: redis://redis:6379/0
      RESULT_BACKEND_URL: redis://redis:6379/1
      # CRITICAL: Change this to your laptop's Wi-Fi IP, NOT localhost
      API_BASE_URL: http://172.20.10.13:8000
      WEIGHTS_YOLO_PATH: /app/runtime/assets/weights/FINAL_BEST_YOLO_SAHI.pt
      WEIGHTS_MOBILENET_PATH: /app/runtime/assets/weights/mobilenet_best.pt
      FAISS_INDEX_PATH: /app/runtime/assets/database/golden_anchors.index
      FAISS_LABELS_PATH: /app/runtime/assets/database/anchor_labels.npy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/runtime:/app/runtime
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcb-worker
    restart: unless-stopped
    # CRITICAL: Concurrency locked to 1 to protect your 16GB RAM
    command: celery -A celery_worker.celery_app worker --loglevel=INFO --concurrency=1 --pool=solo
    environment:
      REDIS_URL: redis://redis:6379/0
      RESULT_BACKEND_URL: redis://redis:6379/1
      # CRITICAL: Change this to your laptop's Wi-Fi IP, NOT localhost
      API_BASE_URL: http://172.20.10.13:8000
      WEIGHTS_YOLO_PATH: /app/runtime/assets/weights/FINAL_BEST_YOLO_SAHI.pt
      WEIGHTS_MOBILENET_PATH: /app/runtime/assets/weights/mobilenet_best.pt
      FAISS_INDEX_PATH: /app/runtime/assets/database/golden_anchors.index
      FAISS_LABELS_PATH: /app/runtime/assets/database/anchor_labels.npy
    volumes:
      - ./backend:/app
      - ./backend/runtime:/app/runtime
    depends_on:
      redis:
        condition: service_healthy